# 云效流水线 —— agent-minimal Docker 部署
#
# 前置:
# - 主机组:agent-minimal-prod(数字 ID 345908, YAML 使用 uuid ADKjbqhYfUzshePu)
# - Codeup 代码源服务连接:xrhfc959mqp5nqye
# - ACR 个人版服务连接:qej3ipnct3c44kni
# - 服务器已存在 /opt/agent-minimal/.env,至少包含 DEEPSEEK_API_KEY

sources:
  agent_minimal_repo:
    type: codeup
    name: agent-minimal
    endpoint: https://codeup.aliyun.com/62cd1e4411fc0f0c9e2b51d0/agent/agent-minimal.git
    branch: main
    triggerEvents:
      - push
    certificate:
      type: serviceConnection
      serviceConnection: xrhfc959mqp5nqye

defaultWorkspace: agent_minimal_repo

stages:
  lint_stage:
    name: "代码检查"
    jobs:
      ruff_job:
        name: "ruff lint + format"
        runsOn:
          group: public/cn-hongkong
          container: build-steps-public-registry.cn-hongkong.cr.aliyuncs.com/build-steps/alinux3:latest
        steps:
          setup_python_step:
            name: "安装 Python 3.12"
            step: SetupPython
            with:
              pythonVersion: "3.12"
          ruff_step:
            name: "ruff check + format --check"
            step: Command
            with:
              run: |
                set -euo pipefail
                python -m pip install --disable-pip-version-check ruff==0.15.15 -i https://mirrors.aliyun.com/pypi/simple
                ruff check
                ruff format --check

  image_stage:
    name: "镜像构建"
    jobs:
      image_job:
        name: "构建并推送 Docker 镜像"
        runsOn:
          group: public/cn-hongkong
          container: build-steps-public-registry.cn-hongkong.cr.aliyuncs.com/build-steps/alinux3:latest
        steps:
          docker_build_step:
            name: "ACR Docker build + push"
            step: DockerBuildPushACR
            with:
              serviceConnection: qej3ipnct3c44kni
              region: cn-hongkong
              artifact: agent_minimal_image
              dockerRegistry: crpi-hych6zm27jhqndgw.cn-hongkong.personal.cr.aliyuncs.com/qv7k/agent-minimal
              dockerTag: ${CI_COMMIT_ID}
              dockerfilePath: Dockerfile
              cacheType: remote
          package_deploy_step:
            name: "打包部署文件"
            step: Command
            with:
              run: |
                set -euo pipefail
                tar czf deploy.tgz docker-compose.yml
                ls -lh deploy.tgz
          upload_deploy_step:
            name: "上传部署包"
            step: ArtifactUpload
            with:
              uploadType: flowPublic
              artifact: deploy_bundle
              filePath:
                - deploy.tgz

  deploy_stage:
    name: "部署"
    jobs:
      vm_deploy_job:
        name: "Docker Compose 部署到轻量服务器"
        component: VMDeploy
        with:
          artifact: $[stages.image_stage.image_job.upload_deploy_step.artifacts.deploy_bundle]
          downloadArtifact: true
          machineGroup: "ADKjbqhYfUzshePu"
          artifactDownloadPath: "/tmp/agent-minimal-deploy.tgz"
          executeUser: "root"
          run: |
            set -euo pipefail

            APP=/opt/agent-minimal
            REGISTRY_HOST=crpi-hych6zm27jhqndgw.cn-hongkong.personal.cr.aliyuncs.com
            IMAGE_TAG="${CI_COMMIT_ID}"

            mkdir -p "$APP"
            tar xzf /tmp/agent-minimal-deploy.tgz -C "$APP"
            rm -f /tmp/agent-minimal-deploy.tgz
            cd "$APP"

            if [ ! -f .env ]; then
              echo "missing $APP/.env; create it with DEEPSEEK_API_KEY before deploying" >&2
              exit 1
            fi

            if [ -n "${REGISTRY_USERNAME:-}" ] && [ -n "${REGISTRY_PASSWORD:-}" ]; then
              echo "$REGISTRY_PASSWORD" | docker login --username "$REGISTRY_USERNAME" --password-stdin "$REGISTRY_HOST"
            fi

            REGISTRY_HOST="$REGISTRY_HOST" IMAGE_TAG="$IMAGE_TAG" docker compose pull agent-minimal
            REGISTRY_HOST="$REGISTRY_HOST" IMAGE_TAG="$IMAGE_TAG" docker compose up -d --remove-orphans
            REGISTRY_HOST="$REGISTRY_HOST" IMAGE_TAG="$IMAGE_TAG" docker compose ps

            for i in $(seq 1 30); do
              status="$(docker inspect -f '{{.State.Health.Status}}' agent-minimal 2>/dev/null || true)"
              if [ "$status" = "healthy" ]; then
                break
              fi
              if [ "$i" = "30" ]; then
                echo "agent-minimal health status: $status" >&2
                docker logs --tail 100 agent-minimal >&2 || true
                exit 1
              fi
              sleep 2
            done

            docker exec agent-minimal python -c "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/healthz',timeout=3); print(r.read().decode()); exit(0 if r.status==200 else 1)"
            docker exec ftai-caddy wget -qO- --timeout=3 http://agent-minimal:8000/healthz
            echo "deploy ok: ${REGISTRY_HOST}/qv7k/agent-minimal:${IMAGE_TAG}"

# 云效流水线 —— agent-minimal
# 三段:lint(ruff)→ 打包源码 → 部署到轻量服务器 systemd
#
# 两个占位需要你在云效控制台创建对应资源后填回(只填一次):
#   <SERVICE_CONNECTION_ID> —— 通用制品仓库的服务连接(首次创建)
#   <MACHINE_GROUP_ID>       —— 主机组的 ID(关联你的轻量服务器)
# 详细步骤见 docs/deploy.md。

stages:
  # ---------- 1. 代码检查 ----------
  lint_stage:
    name: "代码检查"
    jobs:
      ruff_job:
        name: "ruff lint + format"
        runsOn:
          group: public/cn-beijing
          container: build-steps-public-registry.cn-beijing.cr.aliyuncs.com/build-steps/alinux3:latest
        steps:
          setup_python_step:
            name: "安装 Python 3.12"
            step: SetupPython
            with:
              pythonVersion: "3.12"
          ruff_step:
            name: "ruff check + format --check"
            step: Command
            with:
              run: |
                pip install uv -i https://mirrors.aliyun.com/pypi/simple
                uv sync --frozen
                uv run ruff check
                uv run ruff format --check

  # ---------- 2. 构建 ----------
  build_stage:
    name: "构建"
    jobs:
      package_job:
        name: "打包源码为 tgz"
        runsOn:
          group: public/cn-beijing
          container: build-steps-public-registry.cn-beijing.cr.aliyuncs.com/build-steps/alinux3:latest
        steps:
          package_step:
            name: "tar 打包"
            step: Command
            with:
              run: |
                # 打包应用源码,排除虚拟环境、缓存、git、本地 .env(防止泄密)
                tar czf package.tgz \
                  --exclude='./.venv' \
                  --exclude='./.git' \
                  --exclude='./__pycache__' \
                  --exclude='./*/__pycache__' \
                  --exclude='./.ruff_cache' \
                  --exclude='./.pytest_cache' \
                  --exclude='./.idea' \
                  --exclude='./.env' \
                  .
                ls -lh package.tgz
          artifact_upload_step:
            name: "上传制品"
            step: ArtifactUpload
            with:
              uploadType: packages
              serviceConnection: "<SERVICE_CONNECTION_ID>"
              repo: flow_generic_repo
              artifact: "Artifacts_${PIPELINE_ID}"
              filePath: "package.tgz"
              version: "${BUILD_NUMBER}"

  # ---------- 3. 部署到轻量服务器 ----------
  deploy_stage:
    name: "部署"
    jobs:
      vm_deploy_job:
        name: "VMDeploy 到 systemd"
        component: VMDeploy
        with:
          downloadArtifact: true
          machineGroup: "<MACHINE_GROUP_ID>"
          artifactDownloadPath: "/tmp/agent-minimal-package.tgz"
          executeUser: "root"
          # 该脚本在目标主机上以 root 执行(部署是个 idempotent 操作)
          run: |
            set -euo pipefail
            APP=/opt/agent-minimal
            mkdir -p "$APP"
            tar xzf /tmp/agent-minimal-package.tgz -C "$APP"
            rm -f /tmp/agent-minimal-package.tgz
            cd "$APP"

            # 同步依赖(uv 用 lockfile,生产可重复)
            /root/.local/bin/uv sync --frozen

            # 首次部署:若 systemd unit 还没装,自动 enable
            if [ ! -e /etc/systemd/system/agent-minimal.service ]; then
              cp deploy/agent-minimal.service /etc/systemd/system/
              systemctl daemon-reload
              systemctl enable agent-minimal
            fi

            systemctl restart agent-minimal
            sleep 3
            systemctl is-active agent-minimal

            # 健康检查:起不来流水线就红
            curl -fsS http://127.0.0.1:8000/healthz
          artifact: $[stages.build_stage.package_job.artifact_upload_step.artifacts.Artifacts_${PIPELINE_ID}]
